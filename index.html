<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Typing practice - 30/60 second sprint</p>
      <div class="title-row">
        <h1>TypeFlow</h1>
      </div>
      <p class="subtitle"> A simple typing test website.</p>
    </section>
    <section class="stats" aria-label="typing stats">
      <div class="stat">
        <span class="stat-label">Time</span>
        <span id="time" class="stat-value">60</span>
      </div>
      <div class="stat">
        <span class="stat-label">WPM</span>
        <span id="wpm" class="stat-value">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Accuracy</span>
        <span id="accuracy" class="stat-value">100%</span>
      </div>
      <div class="stat">
        <span class="stat-label">Mistakes</span>
        <span id="mistakes" class="stat-value">0</span>
      </div>
    </section>
    <section class="card">
      <p class="card-label">Prompt: </p>
      <div id="text" class="prompt"></div>
      <div class="divider"></div>
      <label class="input-label" for="input">Start Typing...</label>
      <textarea id="input" placeholder="Click here and start typing..."></textarea>
      <div class="actions">
        <button id="restart">Restart</button>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
