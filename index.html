<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shell">
    <div id="typing-screen">
    <section class="hero">
      <p class="eyebrow">Typing practice - 30/60 second sprint</p>
      <div class="title-row">
        <h1>TypeFlow</h1>
      </div>
      <p class="subtitle"> A simple typing speed test website</p>
    </section>
   <div class="time-selector">
      <button class="time-btn active" data-time="30">30s</button>
      <button class="time-btn" data-time="60">60s</button>
    </div>
    <section class="stats" aria-label="typing stats">
      <div class="stat">
        <span class="stat-label">Time Remaining</span>
        <span id="time" class="stat-value">30</span>
      </div>
      <div class="stat">
        <span class="stat-label">Words/Min</span>
        <span id="wpm" class="stat-value">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Accuracy</span>
        <span id="accuracy" class="stat-value">100%</span>
      </div>
      <div class="stat">
        <span class="stat-label">Mistakes</span>
        <span id="mistakes" class="stat-value">0</span>
      </div>
    </section>
    <section class="card">
      <p class="card-label">Prompt: </p>
      <div id="text" class="prompt"></div>
      <div class="divider"></div>
      <label class="input-label" for="input">Start Typing...</label>
      <textarea id="input" placeholder="Click here and start typing..."></textarea>
      <div class="actions">
        <button id="restart">Restart</button>
      </div>
    </section>
    </div>
    <div id="results-screen" class="hidden">
    <h2>Results</h2>
    <div class="results-grid">
        <div>
            <p>WPM</p>
            <h3 id="final-wpm">0</h3>
        </div>
        <div>
            <p>Accuracy</p>
            <h3 id="final-accuracy">0%</h3>
        </div>
        <div>
            <p>Mistakes</p>
            <h3 id="final-mistakes">0</h3>
        </div>
    </div>
    <button id="try-again">Try Again</button>
</div>
  </main>
  <script src="script.js"></script>
</body>
</html>
